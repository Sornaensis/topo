name: topo-plugin-example
version: 1.0.0.0
license: MPL-2.0
license-file: LICENSE
author: You
maintainer: you@example.com
category: Terrain
synopsis: Example topo plugin demonstrating SDK usage

library:
  source-dirs: src
  exposed-modules:
    - Topo.Plugin.Example
  dependencies:
    - base >=4.18 && <5
    - aeson >=2.1 && <2.3
    - containers
    - text
    - topo-plugin-sdk
    - vector

executables:
  topo-plugin-example:
    main: Main.hs
    source-dirs: app
    dependencies:
      - base >=4.18 && <5
      - topo-plugin-example

tests:
  topo-plugin-example-test:
    main: Spec.hs
    source-dirs: test
    dependencies:
      - base
      - aeson
      - hspec
      - topo
      - topo-plugin-example
      - topo-plugin-sdk
