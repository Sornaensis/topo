name: topo
version: 1.0.0.0
license: MPL-2.0
license-file: LICENSE
author: You
maintainer: you@example.com
category: Terrain
synopsis: Terrain data generation library

library:
  source-dirs: src
  exposed-modules:
    - Topo
    - Topo.Types
    - Topo.World
    - Topo.Hex
    - Topo.Metadata
    - Topo.Plugin
    - Topo.Pipeline
    - Topo.Pipeline.Stage
    - Topo.Pipeline.Dep
    - Topo.Pipeline.Registry
    - Topo.Pipeline.Diagnostics
    - Topo.Calendar
    - Topo.Solar
    - Topo.Overlay
    - Topo.Overlay.Schema
    - Topo.Overlay.Provenance
    - Topo.Overlay.Index
    - Topo.Overlay.Cache
    - Topo.Overlay.Indexed
    - Topo.Overlay.Export
    - Topo.Overlay.JSON
    - Topo.Overlay.Storage
    - Topo.Persistence.WorldBundle
    - Topo.BaseHeight
    - Topo.Gen
    - Topo.Tectonics
    - Topo.Erosion
    - Topo.Glacier
    - Topo.Hydrology
    - Topo.Hydrology.StageHydrology
    - Topo.Hypsometry
    - Topo.River
    - Topo.Volcanism
    - Topo.WaterBody
    - Topo.WaterTable
    - Topo.Parameters
    - Topo.Parameters.Recompute
    - Topo.Soil
    - Topo.Vegetation
    - Topo.Climate
    - Topo.Climate.Config
    - Topo.Climate.Evaporation
    - Topo.Climate.ITCZ
    - Topo.Climate.MoistureTransport
    - Topo.Climate.Precipitation
    - Topo.BiomeConfig
    - Topo.Weather
    - Topo.Weather.Normals
    - Topo.Math
    - Topo.Grid.Diffusion
    - Topo.Grid.HexDirection
    - Topo.Seed
    - Topo.TerrainGrid
    - Topo.Noise
    - Topo.Sample
    - Topo.Export
    - Topo.Storage
    - Topo.Mesh
    - Topo.WorldGen
    - Topo.Biome
    - Topo.Biome.Name
    - Topo.Biome.Refine
    - Topo.Biome.Refine.Alpine
    - Topo.Biome.Refine.Coastal
    - Topo.Biome.Refine.Desert
    - Topo.Biome.Refine.Forest
    - Topo.Biome.Refine.Grassland
    - Topo.Biome.Refine.Ocean
    - Topo.Biome.Refine.Rainforest
    - Topo.Biome.Refine.Savanna
    - Topo.Biome.Refine.Shrubland
    - Topo.Biome.Refine.Snow
    - Topo.Biome.Refine.Swamp
    - Topo.Biome.Refine.Taiga
    - Topo.Biome.Refine.Tundra
    - Topo.Biome.Refine.Volcanic
    - Topo.PlateMetadata
    - Topo.Planet
    - Topo.OceanCurrent
    - Topo.Units
    - Topo.Units.Config
    - Topo.Simulation
    - Topo.Simulation.Schedule
    - Topo.Simulation.DAG
    - Topo.Simulation.Pipeline
    - Topo.Plugin.DataResource
    - Topo.Plugin.DataResource.Validation
    - Topo.Plugin.Dependency
    - Topo.Plugin.RPC
    - Topo.Plugin.RPC.DataService
    - Topo.Plugin.RPC.ExternalDataSource
    - Topo.Plugin.RPC.Manifest
    - Topo.Plugin.RPC.Protocol
    - Topo.Plugin.RPC.Scope
    - Topo.Plugin.RPC.Stream
    - Topo.Plugin.RPC.Transport
    - Topo.Config
    - Topo.Config.JSON
    - Topo.TerrainForm.Modifiers
    - Topo.TerrainForm.Metrics
  dependencies:
    - base >=4.18 && <5
    - aeson >=2.1 && <2.3
    - async
    - base64-bytestring
    - binary
    - bytestring
    - containers
    - crypton
    - directory
    - filepath
    - mtl
    - network
    - stm
    - text
    - time
    - temporary
    - transformers
    - vector
    - vector-th-unbox
    - zstd
  when:
    - condition: "!os(windows)"
      dependencies:
        - unix
    - condition: os(windows)
      extra-libraries:
        - advapi32

tests:
  topo-test:
    main: Spec.hs
    source-dirs: test
    ghc-options:
      - -threaded
      - -rtsopts
    dependencies:
      - base
      - topo
      - aeson
      - base64-bytestring
      - binary
      - bytestring
      - hspec
      - QuickCheck
      - containers
      - mtl
      - directory
      - filepath
      - scientific
      - stm
      - temporary
      - text
      - time
      - vector
    when:
      - condition: "!os(windows)"
        dependencies:
          - unix
