    - Topo.Plugin.RPC.Protocol
    - Topo.Plugin.RPC.Transport
    - Topo.Config.JSON
    - Topo.TerrainForm.Modifiers
    - Topo.TerrainForm.Metrics
  dependencies:
    - base >=4.18 && <5
    - aeson >=2.1 && <2.3
    - async
    - binary
    - bytestring
    - containers
    - directory
    - filepath
    - mtl
    - text
    - transformers
    - vector
    - vector-th-unbox
    - zstd

tests:
  topo-test:
    main: Spec.hs
    source-dirs: test
    dependencies:
      - base
      - topo
      - aeson
      - binary
      - bytestring
      - hspec
      - QuickCheck
      - containers
      - directory
      - filepath
      - scientific
      - temporary
      - text
      - vector
