name: topo
version: 0.1.0.0
license: MPL-2.0
license-file: LICENSE
author: You
maintainer: you@example.com
category: Terrain
synopsis: Terrain data generation library

library:
  source-dirs: src
  exposed-modules:
    - Topo
    - Topo.Types
    - Topo.World
    - Topo.Hex
    - Topo.Metadata
    - Topo.Plugin
    - Topo.Pipeline
