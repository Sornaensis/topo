name: topo-plugin-sdk
version: 1.0.0.0
license: MPL-2.0
license-file: LICENSE
author: You
maintainer: you@example.com
category: Terrain
synopsis: SDK for building topo plugins

library:
  source-dirs: src
  exposed-modules:
    - Topo.Plugin.SDK
    - Topo.Plugin.SDK.Overlay
    - Topo.Plugin.SDK.Terrain
    - Topo.Plugin.SDK.Types
    - Topo.Plugin.SDK.Payload
    - Topo.Plugin.SDK.Runner
  dependencies:
    - base >=4.18 && <5
    - aeson >=2.1 && <2.3
    - bytestring
    - containers
    - directory
    - filepath
    - stm
    - text
    - topo
    - vector

executables:
  topo-plugin-fixture:
    main: Main.hs
    source-dirs:
      - test/fixture-exe
      - test/fixtures
    dependencies:
      - base >=4.18 && <5
      - aeson >=2.1 && <2.3
      - bytestring
      - containers
      - text
      - topo
      - topo-plugin-sdk

tests:
  topo-plugin-sdk-test:
    main: Spec.hs
    source-dirs:
      - test
      - test/fixtures
    dependencies:
      - base
      - aeson
      - bytestring
      - containers
      - directory
      - filepath
      - hspec
      - process
      - text
      - time
      - topo
      - topo-plugin-sdk
