name: Release coverage gate

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/coverage.yml'
      - 'stack.yaml'
      - 'stack.yaml.lock'
      - '**/package.yaml'
      - '**/*.cabal'
      - '**/*.hs'
      - 'tools/check-coverage-thresholds.py'
  pull_request:
    paths:
      - '.github/workflows/coverage.yml'
      - 'stack.yaml'
      - 'stack.yaml.lock'
      - '**/package.yaml'
      - '**/*.cabal'
      - '**/*.hs'
      - 'tools/check-coverage-thresholds.py'

jobs:
  workspace-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-version: 'latest'
      - name: Install native SDL dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsdl2-dev libsdl2-ttf-dev
      - name: Build, test, and generate coverage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp/coverage
          stack --work-dir .stack-work-ci-coverage test --coverage 2>&1 | tee .tmp/coverage/stack-test-coverage.log
          stack --work-dir .stack-work-ci-coverage hpc report --all 2>&1 | tee .tmp/coverage/hpc-report.log
      - name: Enforce release coverage thresholds
        run: python3 tools/check-coverage-thresholds.py .tmp/coverage/hpc-report.log
      - name: Upload coverage logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-logs
          path: .tmp/coverage/
