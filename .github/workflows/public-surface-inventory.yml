name: Public surface inventory

on:
  pull_request:
    paths:
      - "stack.yaml"
      - "**/package.yaml"
      - "docs/inventory/**"
      - "tools/check-public-surface.py"
      - ".github/workflows/public-surface-inventory.yml"
  push:
    branches:
      - master
      - main
    paths:
      - "stack.yaml"
      - "**/package.yaml"
      - "docs/inventory/**"
      - "tools/check-public-surface.py"
      - ".github/workflows/public-surface-inventory.yml"

jobs:
  check-public-surface:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate public module and feature inventory
        run: python tools/check-public-surface.py
