name: topo-plugin-civ-example
version: 1.0.0.0
license: MPL-2.0
license-file: LICENSE
author: You
maintainer: you@example.com
category: Terrain
synopsis: Example civilization overlay plugin for topo

library:
  source-dirs: src
  exposed-modules:
    - Topo.Plugin.CivExample
  dependencies:
    - base >=4.18 && <5
    - aeson >=2.1 && <2.3
    - bytestring
    - containers
    - text
    - topo
    - topo-plugin-sdk

executables:
  topo-plugin-civ-example:
    main: Main.hs
    source-dirs: app
    dependencies:
      - base >=4.18 && <5
      - topo-plugin-civ-example

tests:
  topo-plugin-civ-example-test:
    main: Spec.hs
    source-dirs: test
    dependencies:
      - base
      - aeson
      - directory
      - filepath
      - hspec
      - text
      - topo
      - topo-plugin-civ-example
      - topo-plugin-sdk
